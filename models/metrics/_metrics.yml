metrics:
  - group_name: Censos
    description: "Indicadores clave de desempeño derivados de las encuestas de censo en terreno."
    columns:
      - name: "N Clientes"
        description: "Cantidad total de clientes únicos que fueron censados en el periodo."
      - name: "N Permite censos"
        description: "Cantidad de clientes que permitieron la realización del censo."
      - name: "N Clientes Sin Activos"
        description: "Cantidad de clientes que no tienen shoperas instaladas."
        calculation: " Count disctint clientes_id that have schoperas_ccu = 0 or None"
      - name: "% Permite censos"
        description: "Porcentaje de clientes que permitieron el censo sobre el total de intentos."
      - name: "N con AbInbev"
        description: "Cantidad de clientes con presencia de marcas AbInbev detectadas en el censo."
      - name: "% con AbInbev"
        description: "Porcentaje de presencia de marcas AbInbev."
      - name: "N con Kross"
        description: "Cantidad de clientes con presencia de marca Kross."
      - name: "% con Kross"
        description: "Porcentaje de presencia de marca Kross."
      - name: "N con CCU"
        description: "Cantidad de clientes con presencia de marcas CCU."
      - name: "% con CCU"
        description: "Porcentaje de presencia de marcas CCU."
      - name: "N con Otras Marcas"
        description: "Cantidad de clientes con presencia de marcas de otros competidores."
      - name: "% con Otras Marcas"
        description: "Porcentaje de presencia de otras marcas."
      - name: "N con Comp. en Salida"
        description: "Cantidad de clientes con presencia de competencia en las salidas de la schopera CCU."
      - name: "% con Comp. en Salida"
        description: "Porcentaje de clientes con competencia en salida CCU."
      - name: "N que Instalaron"
        description: "Cantidad de clientes donde se realizó una instalación de activo nuevo durante el censo (instalo > 0 )"
      - name: "% que Instalaron"
        description: "Porcentaje de clientes con instalaciones nuevas."
      - name: "N que Disponibilizaron"
        description: "Cantidad de clientes que dejaron salidas o activos disponibles para uso."
      - name: "% que Disponibilizaron"
        description: "Porcentaje de clientes que disponibilizaron al menos una salida (disponibilizar > 0)"

  - group_name: Bases CCU
    description: "indicadores derivados de la base oficial de activos de CCU."
    columns:
      - name: "N Clientes"
        description: "Cantidad total de clientes únicos presentes en la base oficial de CCU para el periodo."
      - name: "N Clientes Local Imagen"
        description: "Cantidad de clientes clasificados como 'Local Imagen' según su contrato en la base oficial."
      - name: "N Clientes Nuevos"
        description: "Cantidad de clientes que aparecen por primera vez en la bases CCU con contrato respecto al periodo anterior."
